name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Build and Deploy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Astro Site
        # We copy the bundled media into public/media so Vite finds them
        # And pass a relative path for the Vault in CI so it uses the in-repo version
        run: |
          mkdir -p src/assets
          ln -s ../../Vault/Websites/jamalwilliams.com/media src/assets/vault-media
          mkdir -p public/media
          cp -R Vault/Websites/jamalwilliams.com/media/* public/media/
          npm run build
        env:
          VAULT_CONTENT_PATH: ./Vault/Websites/jamalwilliams.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jamalwilliams-v3
